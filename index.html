<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W.I.P. | The Wumbo Wolf</title>
    <style>
        /* Base Styles (Mobile First) */
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        
        /* The main content box */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            background-color: #1a1a1a;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            border: 1px solid #333;
            max-width: 400px;
            width: 100%;
        }

        .profile-pic {
            width: 200px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2.2rem;
            margin: 0 0 10px 0;
            letter-spacing: 1px;
        }

        p.bio {
            font-size: 1.1rem;
            color: #b3b3b3;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        a.btn {
            background-color: #242424;
            color: #ffffff;
            text-decoration: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            border: 1px solid #404040;
            transition: all 0.3s ease;
            text-align: center;
        }

        a.btn:hover {
            background-color: #333;
            border-color: #ffd700; /* Gold Wumbo accent */
            color: #ffd700;
        }

        /* ----------------------------------- */
        /* Desktop View (Screens 768px & wider)*/
        /* ----------------------------------- */
        @media (min-width: 768px) {
            .container {
                flex-direction: row; /* Puts image and text side-by-side */
                max-width: 800px;
                text-align: left;
                padding: 40px;
                gap: 40px;
            }

            .profile-pic {
                width: 300px;
                margin-bottom: 0;
            }

            .content-section {
                display: flex;
                flex-direction: column;
                justify-content: center;
                width: 100%;
            }

            .links {
                display: grid;
                grid-template-columns: 1fr 1fr; /* Puts buttons in a 2-column grid */
            }
            
            /* Make the email button span both columns at the bottom */
            a.btn:last-child {
                grid-column: span 2;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="profile.jpg" alt="W.I.P. The Wumbo Wolf" class="profile-pic">
        
        <div class="content-section">
            <h1>The Wumbo Wolf</h1>
            <p class="bio">OS set to W. 🐺💻 <br> Reality currently buffering...</p>
            
            <div class="links">
                <a href="https://tiktok.com/@thewumbowolf" class="btn" target="_blank">TikTok</a>
                <a href="https://instagram.com/thewumbowolf" class="btn" target="_blank">Instagram</a>
                <a href="https://youtube.com/@TheWumboWolf" class="btn" target="_blank">YouTube</a>
                <a href="mailto:collab@wumbowolf.com" class="btn">collab@wumbowolf.com</a>
            </div>
        </div>
    </div>

</body>
</html>
