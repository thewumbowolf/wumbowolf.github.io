<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W.I.P. | The Wumbo Wolf</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 20px;
        }
        img.profile-pic {
            width: 250px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }
        p.bio {
            font-size: 1.2rem;
            color: #b3b3b3;
            margin-bottom: 30px;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        a.btn {
            background-color: #1e1e1e;
            color: #fff;
            text-decoration: none;
            padding: 15px 20px;
            border-radius: 8px;
            font-size: 1.1rem;
            border: 1px solid #333;
            transition: all 0.3s ease;
        }
        a.btn:hover {
            background-color: #333;
            border-color: #ffd700; /* Gold Wumbo accent */
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="profile.jpg" alt="W.I.P. The Wumbo Wolf" class="profile-pic">
        
        <h1>The Wumbo Wolf</h1>
        <p class="bio">OS set to W. 🐺💻 <br> Reality currently buffering...</p>
        
        <div class="links">
            <a href="https://tiktok.com/@thewumbowolf" class="btn" target="_blank">TikTok</a>
            <a href="https://instagram.com/thewumbowolf" class="btn" target="_blank">Instagram</a>
            <a href="mailto:collab@wumbowolf.com" class="btn">collab@wumbowolf.com</a>
        </div>
    </div>
</body>
</html>
